# ============================================================
# Milvus Standalone - Docker Compose
# ============================================================
# This runs Milvus vector database as a Docker container.
#
# Usage:
#   docker-compose up -d       # Start Milvus in background
#   docker-compose down        # Stop Milvus
#   docker-compose logs -f     # View logs
#
# Milvus will be available at: localhost:19530
# Milvus Web UI (Attu): localhost:9091
# ============================================================

services:
  # etcd: metadata storage for Milvus
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO: object storage for Milvus vectors
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"   # MinIO Console
      - "9000:9000"   # MinIO API
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus Standalone: vector database
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.6
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"  # Milvus gRPC port (main connection)
      - "9091:9091"    # Milvus Web UI
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  # PostgreSQL: relational database for keyword search comparison
  postgres:
    container_name: legal-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_db
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: leducminh_2006
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  postgres_data:
